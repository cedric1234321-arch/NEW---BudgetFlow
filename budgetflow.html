<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BudgetFlow">
<meta name="theme-color" content="#0d0f14">
<title>BudgetFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0f14;
  --s1:#141720;
  --s2:#1c2030;
  --s3:#242840;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --text:#eef0f6;
  --muted:#5a6180;
  --muted2:#8890b0;
  --g1:#7effa0;--g2:#00e5ff;--g3:#ff6b8a;--g4:#ffb347;--g5:#b388ff;--g6:#64ffda;
  --r:16px;--r2:12px;--r3:8px;
  --ff:'Outfit',sans-serif;--fm:'JetBrains Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--ff);overflow:hidden;}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative;}

/* ── Scrollable content ── */
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(72px + var(--safe-bottom));padding-top:calc(var(--safe-top) + 8px);}
.page::-webkit-scrollbar{display:none;}

/* ── Bottom nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(13,15,20,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  padding-top:10px;padding-bottom:calc(10px + var(--safe-bottom));
  display:flex;justify-content:space-around;z-index:100;}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;
  color:var(--muted);cursor:pointer;font-family:var(--ff);font-size:9px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;padding:4px 12px;transition:color .15s;}
.nb.on{color:var(--g1);}
.nb svg{width:22px;height:22px;stroke-width:1.8;}
.nb .dot{width:4px;height:4px;border-radius:50%;background:var(--g1);margin-top:1px;opacity:0;transition:opacity .15s;}
.nb.on .dot{opacity:1;}

/* ── PIN screen ── */
#pin-screen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;}
.pin-logo{font-size:48px;margin-bottom:16px;}
.pin-title{font-size:22px;font-weight:800;margin-bottom:4px;}
.pin-sub{font-size:13px;color:var(--muted2);margin-bottom:40px;}
.pin-dots{display:flex;gap:16px;margin-bottom:40px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--muted);transition:all .15s;}
.pin-dot.filled{background:var(--g1);border-color:var(--g1);transform:scale(1.1);}
.pin-dot.err{background:var(--g3);border-color:var(--g3);}
.pin-grid{display:grid;grid-template-columns:repeat(3,80px);gap:12px;}
.pin-btn{width:80px;height:80px;border-radius:50%;background:var(--s2);border:1px solid var(--border2);
  color:var(--text);font-family:var(--ff);font-size:24px;font-weight:600;cursor:pointer;
  transition:all .12s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}
.pin-btn:active{background:var(--s3);transform:scale(.94);}
.pin-btn.del{font-size:20px;}
.pin-btn.empty{background:transparent;border:none;cursor:default;}
.pin-letters{font-size:8px;font-weight:600;letter-spacing:.1em;color:var(--muted);line-height:1;}
.pin-err{color:var(--g3);font-size:13px;height:20px;margin-top:-30px;margin-bottom:10px;}
.pin-reset{margin-top:24px;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--ff);}

/* ── Setup screen ── */
#setup-screen{position:fixed;inset:0;background:var(--bg);z-index:400;overflow-y:auto;padding:40px 24px 60px;}
.setup-title{font-size:28px;font-weight:900;margin-bottom:6px;}
.setup-sub{font-size:14px;color:var(--muted2);margin-bottom:32px;line-height:1.5;}
.setup-step{margin-bottom:28px;}
.setup-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;}
.setup-pin-row{display:flex;gap:10px;}
.setup-pin-input{width:56px;height:64px;background:var(--s2);border:2px solid var(--border2);border-radius:var(--r2);
  color:var(--text);font-family:var(--fm);font-size:28px;text-align:center;outline:none;}
.setup-pin-input:focus{border-color:var(--g1);}
.ifield{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:var(--r2);
  color:var(--text);font-family:var(--ff);font-size:15px;padding:14px 16px;outline:none;transition:border-color .15s;}
.ifield:focus{border-color:var(--g1);}
.ifield::placeholder{color:var(--muted);}
select.ifield option{background:var(--s1);}
.irow{display:flex;gap:8px;margin-bottom:10px;}
.irow .ifield{flex:1;}
.btn-main{width:100%;padding:16px;border-radius:var(--r);background:var(--g1);border:none;
  color:#0d0f14;font-family:var(--ff);font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.02em;
  transition:opacity .15s;}
.btn-main:active{opacity:.85;}

/* ── Cards ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;}
.card+.card{margin-top:10px;}

/* ── Home ── */
.home-header{padding:16px 20px 0;display:flex;justify-content:space-between;align-items:center;}
.home-logo{font-size:15px;font-weight:900;letter-spacing:.08em;background:linear-gradient(90deg,var(--g1),var(--g2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.home-period{font-family:var(--fm);font-size:11px;color:var(--muted);}

.month-nav{display:flex;align-items:center;gap:0;padding:12px 20px 0;}
.mnbtn{background:var(--s2);border:1px solid var(--border);border-radius:var(--r3);width:34px;height:34px;
  color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mnbtn:active{background:var(--s3);}
.mnlabel{flex:1;text-align:center;font-family:var(--fm);font-size:13px;font-weight:500;}

/* Balance hero */
.balance-hero{margin:14px 20px 0;background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--border2);border-radius:20px;padding:22px;position:relative;overflow:hidden;}
.balance-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(126,255,160,.12),transparent 70%);}
.bh-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
.bh-amount{font-size:42px;font-weight:900;letter-spacing:-.02em;line-height:1;}
.bh-amount.pos{color:var(--g1);}
.bh-amount.neg{color:var(--g3);}
.bh-row{display:flex;gap:0;margin-top:16px;}
.bh-item{flex:1;display:flex;flex-direction:column;gap:2px;}
.bh-item+.bh-item{border-left:1px solid var(--border);padding-left:16px;margin-left:16px;}
.bh-item-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.bh-item-val{font-family:var(--fm);font-size:15px;font-weight:500;}

/* Accounts chips */
.accounts-scroll{display:flex;gap:8px;padding:14px 20px 0;overflow-x:auto;}
.accounts-scroll::-webkit-scrollbar{display:none;}
.acc-chip{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;flex-shrink:0;min-width:130px;}
.acc-chip-name{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);}
.acc-chip-bal{font-family:var(--fm);font-size:18px;font-weight:500;margin-top:2px;}

/* Section title */
.sec{padding:18px 20px 10px;display:flex;justify-content:space-between;align-items:center;}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);}
.sec-btn{background:var(--s2);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;
  color:var(--text);font-family:var(--ff);font-size:11px;font-weight:700;cursor:pointer;}
.sec-btn:active{background:var(--s3);}

/* Budget bars */
.budgets-wrap{padding:0 20px;}
.bud-item{margin-bottom:14px;}
.bud-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.bud-left{display:flex;align-items:center;gap:8px;}
.bud-emoji{font-size:16px;}
.bud-name{font-size:13px;font-weight:700;}
.bud-right{font-family:var(--fm);font-size:11px;color:var(--muted2);}
.bud-right span{color:var(--text);}
.track{height:7px;background:var(--s3);border-radius:4px;overflow:hidden;}
.fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* Alerts */
.alerts-wrap{padding:0 20px;}
.alert{display:flex;align-items:center;gap:10px;border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;font-size:12px;font-weight:600;}
.alert.danger{background:rgba(255,107,138,.08);border:1px solid rgba(255,107,138,.25);}
.alert.warn{background:rgba(255,179,71,.08);border:1px solid rgba(255,179,71,.25);}
.alert-ico{font-size:18px;}

/* Transactions */
.txs-wrap{padding:0 20px;}
.tx{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);}
.tx:last-child{border-bottom:none;}
.tx-ico{width:40px;height:40px;border-radius:12px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:2px;}
.tx-amt{font-family:var(--fm);font-size:14px;font-weight:600;flex-shrink:0;}
.tx-amt.debit{color:var(--g3);}
.tx-amt.credit{color:var(--g2);}
.cash-tag{display:inline-block;background:rgba(255,179,71,.15);border:1px solid rgba(255,179,71,.3);border-radius:4px;padding:1px 5px;font-size:9px;font-weight:700;color:var(--g4);margin-left:4px;}

/* Empty */
.empty{text-align:center;padding:36px 20px;color:var(--muted2);}
.empty-ico{font-size:40px;margin-bottom:10px;}
.empty-txt{font-size:13px;}

/* ── Add page ── */
.add-wrap{padding:20px;}
.add-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:10px;}
.add-card-ico{font-size:32px;margin-bottom:10px;}
.add-card-title{font-size:16px;font-weight:800;margin-bottom:4px;}
.add-card-sub{font-size:12px;color:var(--muted2);margin-bottom:16px;line-height:1.5;}

/* ── Stats ── */
.stats-wrap{padding:0 20px;}
.donut-wrap{display:flex;justify-content:center;padding:10px 0 20px;}
svg.donut{transform:rotate(-90deg);}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.donut-parent{position:relative;display:inline-block;}
.bar-chart{display:flex;flex-direction:column;gap:10px;}
.bc-row{display:flex;align-items:center;gap:10px;}
.bc-label{font-size:11px;font-weight:600;width:80px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bc-track{flex:1;height:26px;background:var(--s3);border-radius:6px;overflow:hidden;position:relative;}
.bc-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;font-family:var(--fm);font-size:10px;font-weight:600;color:#0d0f14;transition:width .5s cubic-bezier(.4,0,.2,1);}
.bc-val{font-family:var(--fm);font-size:11px;color:var(--muted2);width:56px;text-align:right;flex-shrink:0;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sg-item{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;}
.sg-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:4px;}
.sg-val{font-family:var(--fm);font-size:18px;font-weight:600;}

/* ── Revenus ── */
.rev-hero{margin:14px 20px 0;background:linear-gradient(135deg,rgba(0,229,255,.06),rgba(100,255,218,.06));border:1px solid rgba(0,229,255,.2);border-radius:20px;padding:20px;}
.rev-hero-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--g2);margin-bottom:4px;}
.rev-hero-amount{font-size:36px;font-weight:900;color:var(--g2);}
.inc-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);}
.inc-dot{width:8px;height:8px;border-radius:50%;background:var(--g2);flex-shrink:0;}
.inc-info{flex:1;}
.inc-name{font-size:13px;font-weight:700;}
.inc-date{font-family:var(--fm);font-size:10px;color:var(--muted);margin-top:2px;}
.inc-amt{font-family:var(--fm);font-size:15px;font-weight:600;color:var(--g2);}

/* ── AI ── */
.ai-wrap{padding:16px 20px;}
.ai-card{background:linear-gradient(135deg,rgba(126,255,160,.05),rgba(0,229,255,.05));border:1px solid rgba(126,255,160,.18);border-radius:var(--r);padding:18px;}
.ai-head{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.ai-pulse{width:8px;height:8px;border-radius:50%;background:var(--g1);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.8);}}
.ai-title{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--g1);}
.ai-msgs{min-height:80px;max-height:300px;overflow-y:auto;margin-bottom:14px;}
.ai-msgs::-webkit-scrollbar{display:none;}
.ai-msg{margin-bottom:14px;}
.ai-msg-role{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.ai-msg-role.user{color:var(--g1);}
.ai-msg-role.bot{color:var(--g2);}
.ai-msg-text{font-size:13px;line-height:1.65;white-space:pre-wrap;}
.ai-loading{color:var(--muted2);font-style:italic;font-size:13px;}
.ai-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.ai-pill{background:var(--s2);border:1px solid var(--border2);border-radius:20px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.ai-pill:active{background:var(--s3);}
.ai-input-row{display:flex;gap:8px;}
.ai-input{flex:1;background:rgba(0,0,0,.3);border:1px solid var(--border2);border-radius:var(--r2);
  color:var(--text);font-family:var(--ff);font-size:13px;padding:11px 14px;outline:none;}
.ai-input:focus{border-color:var(--g1);}
.ai-send{background:var(--g1);border:none;border-radius:var(--r2);width:44px;height:44px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ai-send:active{opacity:.8;}
.ai-send svg{width:18px;height:18px;stroke:#0d0f14;stroke-width:2.5;}

/* ── Settings ── */
.settings-wrap{padding:0 20px;}
.set-section{margin-bottom:24px;}
.set-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;margin-top:18px;}
.set-item{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.set-item-info{flex:1;}
.set-item-name{font-size:13px;font-weight:700;}
.set-item-sub{font-family:var(--fm);font-size:11px;color:var(--muted2);margin-top:2px;}
.set-edit-btn{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r3);padding:6px 12px;color:var(--text);font-family:var(--ff);font-size:11px;font-weight:700;cursor:pointer;}
.set-edit-btn:active{background:var(--s3);}
.set-del-btn{background:rgba(255,107,138,.1);border:1px solid rgba(255,107,138,.25);border-radius:var(--r3);padding:6px 10px;color:var(--g3);font-size:11px;font-weight:700;cursor:pointer;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:var(--s1);border-radius:24px 24px 0 0;border-top:1px solid var(--border2);width:100%;max-width:430px;padding:24px 20px calc(28px + var(--safe-bottom));max-height:92vh;overflow-y:auto;}
.modal::-webkit-scrollbar{display:none;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
.modal-title{font-size:18px;font-weight:800;}
.modal-close{background:var(--s2);border:none;color:var(--muted2);width:32px;height:32px;border-radius:var(--r3);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.modal-close:active{background:var(--s3);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px;}
.toggle-row{display:flex;gap:8px;margin-bottom:14px;}
.tog{flex:1;padding:11px;border-radius:var(--r2);border:1px solid var(--border);background:var(--s2);
  color:var(--muted2);font-family:var(--ff);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.tog.on-debit{background:rgba(255,107,138,.1);border-color:var(--g3);color:var(--g3);}
.tog.on-credit{background:rgba(0,229,255,.1);border-color:var(--g2);color:var(--g2);}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.cat-chip{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;background:var(--s2);
  border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .15s;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted2);}
.cat-chip.sel{border-color:var(--g1);background:rgba(126,255,160,.08);color:var(--g1);}
.cat-chip-ico{font-size:22px;}
.check-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.check-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--g1);}
.check-row label{font-size:13px;font-weight:600;}
.btn-sec{width:100%;padding:14px;border-radius:var(--r);background:var(--s2);border:1px solid var(--border);
  color:var(--text);font-family:var(--ff);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-danger{width:100%;padding:14px;border-radius:var(--r);background:rgba(255,107,138,.08);border:1px solid rgba(255,107,138,.25);
  color:var(--g3);font-family:var(--ff);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}

/* ── CSV drop ── */
.csv-drop{border:2px dashed var(--border2);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:border-color .15s;margin-bottom:14px;}
.csv-drop:active{border-color:var(--g1);}
.csv-drop-ico{font-size:32px;margin-bottom:8px;}
.csv-drop-txt{font-size:13px;color:var(--muted2);}

/* ── Misc ── */
.sp{height:16px;}.sp-sm{height:10px;}
.gradient-text{background:linear-gradient(90deg,var(--g1),var(--g2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hidden{display:none!important;}

/* ── Animations ── */
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.slide-up{animation:slideUp .25s cubic-bezier(.4,0,.2,1);}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.fade-in{animation:fadeIn .2s ease;}
</style>
</head>
<body>

<!-- PIN Screen -->
<div id="pin-screen" class="hidden">
  <div class="pin-logo">💸</div>
  <div class="pin-title">BudgetFlow</div>
  <div class="pin-sub" id="pin-sub">Entrez votre code PIN</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════════════════
const STORAGE_KEY = 'bf_v2';

function load(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||null; }catch{ return null; }
}
function save(data){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch{}
}

const DEFAULT_CATS = [
  {id:'courses',name:'Courses',emoji:'🛒',budget:350,color:'#7effa0'},
  {id:'loyer',name:'Loyer',emoji:'🏠',budget:500,color:'#00e5ff'},
  {id:'charges',name:'Charges',emoji:'⚡',budget:80,color:'#64ffda'},
  {id:'carburant',name:'Carburant',emoji:'⛽',budget:120,color:'#ffb347'},
  {id:'sorties',name:'Sorties',emoji:'🎉',budget:150,color:'#ff6b8a'},
  {id:'shopping',name:'Shopping',emoji:'👕',budget:100,color:'#b388ff'},
  {id:'sante',name:'Santé',emoji:'💊',budget:50,color:'#4fc3f7'},
  {id:'transport',name:'Transport',emoji:'🚌',budget:60,color:'#aed581'},
  {id:'autre',name:'Autre',emoji:'📦',budget:100,color:'#90a4ae'},
];

let DB = null;
let viewMonth = {y:new Date().getFullYear(),m:new Date().getMonth()};

function initDB(){
  DB = {
    pin:'',
    accounts:[
      {id:'bnp',name:'BNP Paribas',balance:0},
      {id:'bourso',name:'Boursorama',balance:0},
      {id:'revolut',name:'Revolut',balance:0},
    ],
    categories: DEFAULT_CATS.map(c=>({...c})),
    transactions:[],
    incomes:[
      {id:'salaire',name:'Salaire alternance',amount:850,day:28,recurring:true},
      {id:'apl',name:'APL',amount:220,day:5,recurring:true},
    ],
    aiHistory:[],
  };
}

// ═══════════════════════════════════════════════════════════
// STARTUP
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', ()=>{
  const stored = load();
  if(!stored || !stored.pin){
    showSetup();
  } else {
    DB = stored;
    showPIN('unlock');
  }
});

// ═══════════════════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════════════════
function showSetup(){
  initDB();
  document.getElementById('setup-screen').classList.remove('hidden');
  // Budget inputs
  const wrap = document.getElementById('setup-budgets');
  wrap.innerHTML = DEFAULT_CATS.map(c=>`
    <div>
      <div style="font-size:10px;font-weight:700;color:var(--muted2);margin-bottom:4px;">${c.emoji} ${c.name}</div>
      <input class="ifield" type="number" id="sb-${c.id}" value="${c.budget}" inputmode="decimal" placeholder="${c.budget}">
    </div>
  `).join('');
  // PIN auto-advance
  for(let i=0;i<4;i++){
    document.getElementById('sp'+i).addEventListener('input',e=>{
      e.target.value=e.target.value.replace(/\D/g,'').slice(0,1);
      if(e.target.value && i<3) document.getElementById('sp'+(i+1)).focus();
    });
  }
}

function finishSetup(){
  const pin = [0,1,2,3].map(i=>document.getElementById('sp'+i).value).join('');
  if(pin.length!==4||!/^\d{4}$/.test(pin)){alert('Le code PIN doit contenir exactement 4 chiffres.');return;}
  DB.pin = hashPin(pin);
  DB.accounts[0].balance = parseFloat(document.getElementById('s-bnp').value)||0;
  DB.accounts[1].balance = parseFloat(document.getElementById('s-bourso').value)||0;
  DB.accounts[2].balance = parseFloat(document.getElementById('s-revolut').value)||0;
  const salAmt = parseFloat(document.getElementById('s-salaire').value)||850;
  const salDay = parseInt(document.getElementById('s-sal-day').value)||28;
  const aplAmt = parseFloat(document.getElementById('s-apl').value)||220;
  const aplDay = parseInt(document.getElementById('s-apl-day').value)||5;
  DB.incomes[0] = {id:'salaire',name:'Salaire alternance',amount:salAmt,day:salDay,recurring:true};
  DB.incomes[1] = {id:'apl',name:'APL',amount:aplAmt,day:aplDay,recurring:true};
  DEFAULT_CATS.forEach(c=>{
    const v = parseFloat(document.getElementById('sb-'+c.id).value);
    const cat = DB.categories.find(x=>x.id===c.id);
    if(cat && !isNaN(v)) cat.budget = v;
  });
  save(DB);
  document.getElementById('setup-screen').classList.add('hidden');
  launchApp();
}

// ═══════════════════════════════════════════════════════════
// PIN
// ═══════════════════════════════════════════════════════════
function hashPin(p){
  let h=0;
  for(let i=0;i<p.length;i++){h=(h<<5)-h+p.charCodeAt(i);h|=0;}
  return h.toString();
}

let pinMode='unlock', pinBuffer='', pinAttempts=0;
const PIN_LETTERS={1:'',2:'ABC',3:'DEF',4:'GHI',5:'JKL',6:'MNO',7:'PQRS',8:'TUV',9:'WXYZ',0:''};

function showPIN(mode){
  pinMode=mode; pinBuffer=''; pinAttempts=0;
  const scr=document.getElementById('pin-screen');
  scr.classList.remove('hidden');
  document.getElementById('pin-sub').textContent = mode==='unlock'?'Entrez votre code PIN':'Créez votre nouveau PIN';
  document.getElementById('pin-err').textContent='';
  renderPINGrid();
  updatePINDots();
}

function renderPINGrid(){
  const grid=document.getElementById('pin-grid');
  const keys=[[1,2,3],[4,5,6],[7,8,9],['','0','del']];
  grid.innerHTML='';
  keys.flat().forEach(k=>{
    if(k===''){grid.innerHTML+='<div class="pin-btn empty"></div>';return;}
    if(k==='del'){
      grid.innerHTML+=`<button class="pin-btn del" onclick="pinInput('del')">⌫</button>`;return;
    }
    grid.innerHTML+=`<button class="pin-btn" onclick="pinInput(${k})">
      ${k}<div class="pin-letters">${PIN_LETTERS[k]}</div>
    </button>`;
  });
}

function pinInput(v){
  if(v==='del'){pinBuffer=pinBuffer.slice(0,-1);}
  else if(pinBuffer.length<4){pinBuffer+=v;}
  updatePINDots();
  if(pinBuffer.length===4){
    setTimeout(()=>{
      if(pinMode==='unlock'){
        if(hashPin(pinBuffer)===DB.pin){
          document.getElementById('pin-screen').classList.add('hidden');
          launchApp();
        } else {
          pinAttempts++;
          pinBuffer='';
          updatePINDots(true);
          document.getElementById('pin-err').textContent=
            pinAttempts>=3?'Trop de tentatives. Réinitialise si nécessaire.':'Code incorrect.';
          setTimeout(()=>{
            updatePINDots(false);
            document.getElementById('pin-err').textContent='';
          },600);
        }
      }
    },120);
  }
}

function updatePINDots(err=false){
  for(let i=0;i<4;i++){
    const d=document.getElementById('pd'+i);
    d.className='pin-dot'+(i<pinBuffer.length?(err?' err':' filled'):'');
  }
}

function confirmResetPIN(){
  if(confirm('Réinitialiser supprime toutes tes données. Continuer ?')){
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

// ═══════════════════════════════════════════════════════════
// APP SHELL
// ═══════════════════════════════════════════════════════════
function launchApp(){
  document.getElementById('app').classList.remove('hidden');
  showTab('home');
}

let currentTab='home';
function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const pg=document.getElementById('pg-'+tab);
  pg.classList.remove('hidden');
  pg.classList.add('fade-in');
  document.getElementById('nb-'+tab).classList.add('on');
  renderTab(tab);
}

function renderTab(tab){
  if(tab==='home') renderHome();
  else if(tab==='add') renderAdd();
  else if(tab==='stats') renderStats();
  else if(tab==='revenus') renderRevenus();
  else if(tab==='ai') renderAI();
  else if(tab==='settings') renderSettings();
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const MONTHS=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
function fmt(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);}
function fmtDec(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);}
function today(){return new Date().toISOString().split('T')[0];}
function monthTxs(y,m){
  return (DB.transactions||[]).filter(t=>{
    const d=new Date(t.date);return d.getFullYear()===y&&d.getMonth()===m;
  });
}
function spentByCat(txs){
  const r={};
  txs.filter(t=>t.type==='debit').forEach(t=>{r[t.category]=(r[t.category]||0)+t.amount;});
  return r;
}
function totalBalance(){return (DB.accounts||[]).reduce((s,a)=>s+a.balance,0);}
function prevMonth(){if(viewMonth.m===0){viewMonth={y:viewMonth.y-1,m:11};}else{viewMonth.m--;} renderTab(currentTab);}
function nextMonth(){const n=new Date();if(viewMonth.y===n.getFullYear()&&viewMonth.m===n.getMonth())return;if(viewMonth.m===11){viewMonth={y:viewMonth.y+1,m:0};}else{viewMonth.m++;} renderTab(currentTab);}

// ═══════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════
function renderHome(){
  const txs=monthTxs(viewMonth.y,viewMonth.m);
  const spent=spentByCat(txs);
  const totalD=txs.filter(t=>t.type==='debit').reduce((s,t)=>s+t.amount,0);
  const totalC=txs.filter(t=>t.type==='credit').reduce((s,t)=>s+t.amount,0);
  const bal=totalBalance();
  const alerts=(DB.categories||[]).map(c=>{
    const s=spent[c.id]||0;const pct=c.budget>0?(s/c.budget)*100:0;
    return{cat:c,s,pct};
  }).filter(x=>x.pct>=80&&x.cat.budget>0);

  let html=`
  <div class="home-header">
    <span class="home-logo">💸 BudgetFlow</span>
    <span class="home-period">${MONTHS[viewMonth.m]} ${viewMonth.y}</span>
  </div>
  <div class="month-nav">
    <button class="mnbtn" onclick="prevMonth()">‹</button>
    <span class="mnlabel">${MONTHS[viewMonth.m]} ${viewMonth.y}</span>
    <button class="mnbtn" onclick="nextMonth()">›</button>
  </div>
  <div class="balance-hero slide-up">
    <div class="bh-label">Solde total consolidé</div>
    <div class="bh-amount ${bal>=0?'pos':'neg'}">${fmt(bal)}</div>
    <div class="bh-row">
      <div class="bh-item"><div class="bh-item-label">Recettes</div><div class="bh-item-val" style="color:var(--g2)">+${fmt(totalC)}</div></div>
      <div class="bh-item"><div class="bh-item-label">Dépenses</div><div class="bh-item-val" style="color:var(--g3)">-${fmt(totalD)}</div></div>
    </div>
  </div>
  <div class="accounts-scroll">
    ${(DB.accounts||[]).map(a=>`
      <div class="acc-chip" onclick="editAccountBalance('${a.id}')">
        <div class="acc-chip-name">${a.name}</div>
        <div class="acc-chip-bal" style="color:${a.balance>=0?'var(--g2)':'var(--g3)'}">${fmt(a.balance)}</div>
      </div>
    `).join('')}
  </div>`;

  if(alerts.length){
    html+=`<div class="sec"><span class="sec-title">⚠️ Alertes</span></div><div class="alerts-wrap">`;
    alerts.forEach(({cat,s,pct})=>{
      const over=pct>=100;
      html+=`<div class="alert ${over?'danger':'warn'}"><span class="alert-ico">${over?'🚨':'⚠️'}</span>
        <span>${over?`Budget ${cat.name} dépassé de ${fmt(s-cat.budget)}`:`${cat.name} à ${Math.round(pct)}% — ${fmt(cat.budget-s)} restants`}</span></div>`;
    });
    html+=`</div>`;
  }

  html+=`<div class="sec"><span class="sec-title">Budgets du mois</span><button class="sec-btn" onclick="openModal('tx')">+ Dépense</button></div><div class="budgets-wrap">`;
  (DB.categories||[]).forEach(c=>{
    const s=spent[c.id]||0;const pct=c.budget>0?Math.min((s/c.budget)*100,100):0;
    const col=pct>=100?'var(--g3)':pct>=80?'var(--g4)':c.color;
    html+=`<div class="bud-item">
      <div class="bud-row">
        <div class="bud-left"><span class="bud-emoji">${c.emoji}</span><span class="bud-name">${c.name}</span></div>
        <div class="bud-right"><span>${fmt(s)}</span> / ${fmt(c.budget)}</div>
      </div>
      <div class="track"><div class="fill" style="width:${pct}%;background:${col};"></div></div>
    </div>`;
  });
  html+=`</div>`;

  // Recent txs
  const recent=txs.slice(0,25);
  html+=`<div class="sec"><span class="sec-title">Transactions récentes</span><button class="sec-btn" onclick="openModal('csv')">Import CSV</button></div>`;
  html+=`<div class="txs-wrap">`;
  if(!recent.length){html+=`<div class="empty"><div class="empty-ico">🧾</div><div class="empty-txt">Aucune transaction ce mois-ci</div></div>`;}
  else{
    recent.forEach(t=>{
      const cat=(DB.categories||[]).find(c=>c.id===t.category)||{emoji:'📦'};
      html+=`<div class="tx" onclick="deleteTxConfirm('${t.id}')">
        <div class="tx-ico">${cat.emoji}</div>
        <div class="tx-info">
          <div class="tx-name">${t.label}${t.cash?'<span class="cash-tag">💵 Espèces</span>':''}</div>
          <div class="tx-meta">${new Date(t.date).toLocaleDateString('fr-FR')} · ${t.accountName||''}</div>
        </div>
        <div class="tx-amt ${t.type}">${t.type==='debit'?'-':'+'}${fmt(t.amount)}</div>
      </div>`;
    });
  }
  html+=`</div><div class="sp"></div>`;
  document.getElementById('pg-home').innerHTML=html;
}

function editAccountBalance(id){
  const acc=(DB.accounts||[]).find(a=>a.id===id);
  if(!acc)return;
  const v=prompt(`Solde actuel de ${acc.name} (€) :`,acc.balance);
  if(v===null)return;
  acc.balance=parseFloat(v)||0;
  save(DB);renderHome();
}

function deleteTxConfirm(id){
  if(!confirm('Supprimer cette transaction ?'))return;
  const tx=(DB.transactions||[]).find(t=>t.id===id);
  if(tx){
    const acc=(DB.accounts||[]).find(a=>a.id===tx.accountId);
    if(acc) acc.balance+=tx.type==='credit'?-tx.amount:tx.amount;
  }
  DB.transactions=(DB.transactions||[]).filter(t=>t.id!==id);
  save(DB);renderHome();
}

// ═══════════════════════════════════════════════════════════
// ADD PAGE
// ═══════════════════════════════════════════════════════════
function renderAdd(){
  document.getElementById('pg-add').innerHTML=`
  <div class="home-header"><span class="home-logo">Ajouter</span></div>
  <div class="add-wrap">
    <div class="add-card slide-up">
      <div class="add-card-ico">💸</div>
      <div class="add-card-title">Nouvelle transaction</div>
      <div class="add-card-sub">Saisie manuelle rapide — dépense ou recette, avec ou sans espèces.</div>
      <button class="btn-main" onclick="openModal('tx')">Ajouter une transaction</button>
    </div>
    <div class="add-card slide-up" style="animation-delay:.08s">
      <div class="add-card-ico">📥</div>
      <div class="add-card-title">Import CSV Finary</div>
      <div class="add-card-sub">Exporte depuis Finary et importe ici. Compatible BNP, Boursorama et Revolut.</div>
      <button class="btn-main" style="background:var(--g2)" onclick="openModal('csv')">Importer un CSV</button>
    </div>
    <div class="add-card slide-up" style="animation-delay:.16s">
      <div class="add-card-ico">💰</div>
      <div class="add-card-title">Planifier un revenu</div>
      <div class="add-card-sub">Salaire, APL, virement récurrent à planifier sur le mois.</div>
      <button class="btn-main" style="background:var(--g5)" onclick="openModal('income')">Ajouter un revenu</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════
function renderStats(){
  const txs=monthTxs(viewMonth.y,viewMonth.m);
  const spent=spentByCat(txs);
  const totalD=txs.filter(t=>t.type==='debit').reduce((s,t)=>s+t.amount,0);
  const totalC=txs.filter(t=>t.type==='credit').reduce((s,t)=>s+t.amount,0);
  const totalBudget=(DB.categories||[]).reduce((s,c)=>s+c.budget,0);
  const marge=Math.max(totalBudget-totalD,0);
  const maxSpent=Math.max(...(DB.categories||[]).map(c=>spent[c.id]||0),1);

  // 6 month trend
  let trend=[];
  for(let i=5;i>=0;i--){
    let y=viewMonth.y,m=viewMonth.m-i;
    if(m<0){m+=12;y--;}
    const s=(DB.transactions||[]).filter(t=>{const d=new Date(t.date);return d.getFullYear()===y&&d.getMonth()===m&&t.type==='debit';}).reduce((s,t)=>s+t.amount,0);
    trend.push({label:MONTHS[m].slice(0,3),s});
  }
  const maxT=Math.max(...trend.map(t=>t.s),1);

  <div class="stats-wrap"><div class="bar-chart">`;

  (DB.categories||[]).forEach((c,i)=>{
    const s=spent[c.id]||0;

    html+=`<div class="bc-row">

function renderAIMessages(){

  wrap.innerHTML=DB.aiHistory.map(m=>`

      <div class="ai-msg-text">${m.content.replace(/</g,'&lt;')}</div>
    </div>`).join('');
  wrap.scrollTop=wrap.scrollHeight;
}

async function aiSend(preset){
  const input=document.getElementById('ai-input');
  const msg=preset||(input?input.value.trim():'');
  if(!msg)return;
  if(input) input.value='';
  document.getElementById('ai-pills').style.display='none';

  if(!DB.aiHistory) DB.aiHistory=[];
  DB.aiHistory.push({role:'user',content:msg});
  renderAIMessages();

  const loadEl=document.createElement('div');
  loadEl.className='ai-loading';
  loadEl.textContent='Claude analyse tes données…';
  document.getElementById('ai-msgs').appendChild(loadEl);
  document.getElementById('ai-msgs').scrollTop=9999;

  const txs=monthTxs(viewMonth.y,viewMonth.m);
  const spent=spentByCat(txs);
  const catSummary=(DB.categories||[]).map(c=>`${c.name}: ${Math.round(spent[c.id]||0)}€ dépensés / ${c.budget}€ budget`).join('\n');
  const totalIncome=(DB.incomes||[]).reduce((s,i)=>s+i.amount,0);

  const systemPrompt=`Tu es un coach financier personnel expert, direct et bienveillant. Tu parles en français. Tu analyses les données de l'utilisateur et donnes des conseils courts, concrets et chiffrés. Jamais de généralités.

Données de l'utilisateur — ${MONTHS[viewMonth.m]} ${viewMonth.y} :
- Solde total : ${Math.round(totalBalance())}€
- Revenus mensuels prévus : ${Math.round(totalIncome)}€
- Dépenses par catégorie :
${catSummary}
- Nombre de transactions : ${txs.length}

Réponds de façon concise (3-6 phrases max), avec des chiffres précis tirés de ses données.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:systemPrompt,
        messages:DB.aiHistory.map(m=>({role:m.role,content:m.content})),
      })
    });
    const data=await res.json();
    const reply=data.content?.[0]?.text||'Erreur de réponse.';
    loadEl.remove();
    DB.aiHistory.push({role:'assistant',content:reply});
    save(DB);
    renderAIMessages();
  }catch(e){
    loadEl.remove();
    DB.aiHistory.push({role:'assistant',content:'Erreur de connexion. Vérifie ta connexion internet.'});
    renderAIMessages();
  }
}

let csvParsed=[];
function modalCSV(){
  return `<div class="modal slide-up">
    <div class="modal-head"><span class="modal-title">Import CSV Finary</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="field"><label>Compte destination</label>
      <select class="ifield" id="csv-account">
        ${(DB.accounts||[]).map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}
      </select>
    </div>
    <div class="csv-drop" onclick="document.getElementById('csv-file').click()">
      <div class="csv-drop-ico">📂</div>
      <div class="csv-drop-txt">Appuie ici pour choisir ton export CSV Finary</div>
      <input id="csv-file" type="file" accept=".csv" style="display:none" onchange="handleCSV(event)">
    </div>
    <div id="csv-preview"></div>
    <button class="btn-main hidden" id="csv-import-btn" onclick="importCSV()">Importer</button>
    <button class="btn-sec" onclick="closeModal()">Annuler</button>
  </div>`;
}

function handleCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    csvParsed=parseCSVFinary(ev.target.result,document.getElementById('csv-account').value);
    const prev=document.getElementById('csv-preview');
    if(!csvParsed.length){prev.innerHTML='<div style="color:var(--g3);font-size:13px;padding:10px 0;">Aucune transaction détectée. Vérifie le format.</div>';return;}
    prev.innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;margin:10px 0 8px;">${csvParsed.length} transaction(s) détectée(s)</div>`+
      csvParsed.slice(0,5).map(t=>`<div class="tx" style="padding:8px 0;">
        <div class="tx-ico">${(DB.categories||[]).find(c=>c.id===t.category)?.emoji||'📦'}</div>
        <div class="tx-info"><div class="tx-name">${t.label}</div><div class="tx-meta">${t.date}</div></div>
        <div class="tx-amt ${t.type}">${t.type==='debit'?'-':'+'}${fmt(t.amount)}</div>
      </div>`).join('');
    document.getElementById('csv-import-btn').classList.remove('hidden');
  };
  reader.readAsText(file,'UTF-8');
}

function parseCSVFinary(text,accountId){
  const acc=(DB.accounts||[]).find(a=>a.id===accountId);
  const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  const results=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].split(/[;,]/).map(c=>c.replace(/^"|"$/g,'').trim());
    if(cols.length<3)continue;
    const date=cols[0]||today();
    const label=cols[1]||'Transaction';
    // Try to find amount — look for first numeric col from index 2
    let amount=0;
    for(let j=2;j<cols.length;j++){
      const v=parseFloat(cols[j].replace(',','.').replace(/\s/g,''));
      if(!isNaN(v)&&v!==0){amount=v;break;}
    }
    if(!label&&amount===0)continue;
    results.push({
      id:Date.now().toString()+i,
      type:amount<0?'debit':'credit',
      label,
      amount:Math.abs(amount),
      date,
      accountId,
      accountName:acc?acc.name:'',
      category:'autre',
      cash:false,
    });
  }
  return results;
}

function importCSV(){
  if(!csvParsed.length)return;
  if(!DB.transactions) DB.transactions=[];
  const accId=document.getElementById('csv-account').value;
  const acc=(DB.accounts||[]).find(a=>a.id===accId);
  csvParsed.forEach(t=>{
    DB.transactions.unshift(t);
    if(acc) acc.balance+=t.type==='credit'?t.amount:-t.amount;
  });
  DB.transactions.sort((a,b)=>new Date(b.date)-new Date(a.date));
  save(DB);
  closeModal();
  alert(`✅ ${csvParsed.length} transactions importées !`);
  if(currentTab==='home') renderHome();
}

// ── PIN change flow ──
// When in 'change' mode, save new pin on 4 digits
const _origPinInput=pinInput;
function pinInput(v){
  if(v==='del'){pinBuffer=pinBuffer.slice(0,-1);}
  else if(pinBuffer.length<4){pinBuffer+=v;}
  updatePINDots();
  if(pinBuffer.length===4){
    setTimeout(()=>{
      if(pinMode==='change'){
        DB.pin=hashPin(pinBuffer);
        save(DB);
        document.getElementById('pin-screen').classList.add('hidden');
        pinBuffer='';
        alert('✅ Code PIN modifié !');
      } else if(pinMode==='unlock'){
        if(hashPin(pinBuffer)===DB.pin){
          document.getElementById('pin-screen').classList.add('hidden');
          launchApp();
        } else {
          pinAttempts++;pinBuffer='';updatePINDots(true);
          document.getElementById('pin-err').textContent=pinAttempts>=3?'Trop de tentatives.':'Code incorrect.';
          setTimeout(()=>{updatePINDots(false);document.getElementById('pin-err').textContent='';},600);
        }
      }
    },120);
  }
}
